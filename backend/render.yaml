databases:
  - name: n2o-dvr-db
    plan: starter
    databaseName: n2o
    user: n2o_user

services:
  - type: web
    name: n2o-dvr-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: n2o-dvr-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: n2o-dvr-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://n2o-dvr.vercel.app"]'
      - key: FILE_STORAGE_PATH
        value: /data
    disk:
      name: n2o-data
      mountPath: /data
      sizeGB: 1

  - type: worker
    name: n2o-dvr-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: n2o-dvr-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: n2o-dvr-redis
          type: redis
          property: connectionString
      - key: FILE_STORAGE_PATH
        value: /data
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: 13aHCy8D78JwJzgffxYbqe7Nmyed84may
    disk:
      name: n2o-data-worker
      mountPath: /data
      sizeGB: 1

  - type: redis
    name: n2o-dvr-redis
    plan: starter
    maxmemoryPolicy: noeviction
