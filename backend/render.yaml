databases:
  - name: n2o-dvr-db
    plan: basic-256mb  # legacy 'starter' was retired; basic-256mb is the new entry tier
    region: frankfurt  # EU region — N2O client is Italian
    databaseName: n2o
    user: n2o_user
    ipAllowList: []    # internal-only; reached by n2o-dvr-api + n2o-dvr-worker over private network

services:
  - type: web
    name: n2o-dvr-api
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    # The docx generators read real .docx templates from backend/templates.
    # The repo keeps them at the root — rootDir is backend/, so ../templates
    # resolves to the repo's templates/ dir. See docx_utils._resolve_templates_dir.
    buildCommand: cp -r ../templates ./templates && pip install -r requirements.txt
    preDeployCommand: PYTHONPATH=. alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: n2o-dvr-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: n2o-dvr-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://n2o-dvr-frontend.onrender.com"]'
      - key: FILE_STORAGE_PATH
        value: /data
    disk:
      name: n2o-data
      mountPath: /data
      sizeGB: 1

  - type: worker
    name: n2o-dvr-worker
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: cp -r ../templates ./templates && pip install -r requirements.txt
    startCommand: celery -A app.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: n2o-dvr-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: n2o-dvr-redis
          type: redis
          property: connectionString
      - key: FILE_STORAGE_PATH
        value: /data
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: 13aHCy8D78JwJzgffxYbqe7Nmyed84may
      # Point at a Render Secret File mounted at /etc/secrets/token.json.
      # Upload the OAuth token via the Render dashboard (Service → Environment →
      # Secret Files). Without this, Drive upload silently no-ops per design.
      - key: GOOGLE_DRIVE_TOKEN_JSON
        value: /etc/secrets/token.json
    disk:
      name: n2o-data-worker
      mountPath: /data
      sizeGB: 1

  - type: web
    name: n2o-dvr-frontend
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: https://n2o-dvr-api.onrender.com
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://n2o-dvr-frontend.onrender.com

  - type: redis
    name: n2o-dvr-redis
    plan: starter
    region: frankfurt
    maxmemoryPolicy: noeviction
    ipAllowList: []  # internal-only; reached by n2o-dvr-api + n2o-dvr-worker over private network
